<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>予約フォーム</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
  <div class="container-fluid py-3">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <h1 class="text-center mb-4">初回限定営業 予約フォーム</h1>
        <div id="diag" class="alert alert-info d-none" style="font-family: monospace; white-space: pre-wrap;"></div>

        <!-- 予約受付終了メッセージ -->
        <div id="closed-message" class="alert alert-warning d-none text-center">
          <p class="mb-3">予約受付は終了いたしました。</p>
          <p class="mb-3">お手数ですがお店に直接お電話ください。</p>
          <p class="mb-3" style="font-size: 1.2em; font-weight: bold;">
            <a href="tel:03-5155-0799" style="color: inherit; text-decoration: none;">03-5155-0799</a>
          </p>
          <a href="tel:03-5155-0799" class="btn btn-primary btn-lg">
            <i class="bi bi-telephone"></i> お店に電話する
          </a>
        </div>

        <div id="event-note" class="alert alert-warning d-none mb-4"></div>

        <div class="mb-4 text-end">
          <a href="faq.html" class="text-decoration-none small">
            <i class="bi bi-question-circle"></i> よくあるご質問 (FAQ) はこちら
          </a>
        </div>

        <form id="form" class="card p-4" novalidate>
          <div class="mb-3">
            <label for="date" class="form-label">日付</label>
            <input id="date" name="date" class="form-control" value="" readonly />
          </div>

          <div class="mb-3">
            <label for="time" class="form-label">ご入店予約時刻 <span class="text-danger">*</span></label>
            <select id="time" name="time" class="form-select" required>
              <option value="">選択してください</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="party_size" class="form-label">ご人数 <span class="text-danger">*</span></label>
            <input id="party_size" name="party_size" type="number" class="form-control" value="1" required min="1" />
          </div>

          <div class="mb-3">
            <label class="form-label">ご予約者様氏名（本名フルネーム） <span class="text-danger">*</span></label>
            <div class="form-text mb-2">ご来店時に受付にてお伝えください</div>
            <div class="row g-2">
              <div class="col-auto">
                <select id="gender" name="gender" class="form-select" required>
                  <option value="女" selected>女</option>
                  <option value="男">男</option>
                </select>
              </div>
              <div class="col">
                <input id="name" name="name" class="form-control" placeholder="山田花子" required maxlength="50" />
              </div>
            </div>
          </div>

          <div id="additional-names-container">
            <!-- Dynamically populated based on party size -->
          </div>

          <div class="mb-3">
            <label class="form-label">当日提示可能なご身分証 <span class="text-danger">*</span></label>
            <div id="id-types-container">
              <!-- Dynamically populated -->
            </div>
            <div class="form-text">※有効期限内のものに限ります</div>
          </div>

          <div class="mb-3">
            <label class="form-label">年齢のご確認 <span class="text-danger">*</span></label>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="age_confirm" id="age_confirm" value="確認" required />
              <label class="form-check-label" for="age_confirm">年齢確認</label>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">撮影・広報利用への同意 <span class="text-danger">*</span></label>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="photo_consent" id="photo_consent" value="同意" required />
              <label class="form-check-label" for="photo_consent" style="font-size: 0.9em;">店内での広報目的の撮影（来店者様にはモザイク処理等を施します）に同意する</label>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">来店確認<span class="text-danger">*</span></label>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="first_visit" id="first_visit" value="確認" required />
              <label class="form-check-label" for="first_visit">3ヶ月以内に初回で入店はしておらず、飲み直しもしたことがありません。</label>
            </div>
          </div>

          <div id="error" class="alert alert-danger d-none">送信に失敗しました。</div>
          <div id="ok" class="alert alert-success d-none">送信しました。LINEトークをご確認ください。</div>
        </form>
      </div>
    </div>
    <!-- フッターボタンのためのスペース -->
    <div style="height: 100px;"></div>
  </div>

  <div class="fixed-bottom-button">
    <div class="container-fluid">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
          <button id="submit" class="btn btn-success btn-lg w-100" type="button">予約内容を送信</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SDKを先に読み込む -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
