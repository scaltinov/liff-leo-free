<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>予約フォーム</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
  <div class="container-fluid py-3">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <h1 class="text-center mb-4">Leo Platinum 予約フォーム</h1>
        <div id="diag" class="alert alert-info d-none" style="font-family: monospace; white-space: pre-wrap;"></div>

        <form id="form" class="card p-4" novalidate>
          <div class="mb-3">
            <label for="date" class="form-label">日付</label>
            <input id="date" name="date" class="form-control" value="11/8" readonly />
          </div>

          <div class="mb-3">
            <label for="time" class="form-label">時刻 <span class="text-danger">*</span></label>
            <select id="time" name="time" class="form-select" required>
              <option value="">選択してください</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="name" class="form-label">予約名 <span class="text-danger">*</span></label>
            <input id="name" name="name" class="form-control" placeholder="山田太郎" required maxlength="50" />
          </div>

          <div class="mb-3">
            <label for="party_size" class="form-label">人数 <span class="text-danger">*</span></label>
            <select id="party_size" name="party_size" class="form-select" required>
              <option value="1" selected>1名</option>
              <option value="2">2名</option>
              <option value="3">3名</option>
              <option value="4">4名</option>
              <option value="5">5名</option>
              <option value="6">6名</option>
              <option value="7">7名</option>
              <option value="8">8名</option>
              <option value="9">9名</option>
            </select>
          </div>

          <div id="error" class="alert alert-danger d-none">送信に失敗しました。</div>
          <div id="ok" class="alert alert-success d-none">送信しました。LINEトークをご確認ください。</div>
        </form>
      </div>
    </div>
    <!-- フッターボタンのためのスペース -->
    <div style="height: 100px;"></div>
  </div>

  <div class="fixed-bottom-button">
    <div class="container-fluid">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
          <button id="submit" class="btn btn-success btn-lg w-100" type="button">予約内容を送信</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SDKを先に読み込む -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="app.js"></script>
</body>
</html>
